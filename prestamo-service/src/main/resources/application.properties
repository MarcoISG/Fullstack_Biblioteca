spring.application.name=prestamo-service
server.port=8082

spring.datasource.url=jdbc:mariadb://localhost:3306/biblioteca_prestamos_db
spring.datasource.username=biblioteca_user
spring.datasource.password=biblioteca_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

libro-service.url=http://localhost:8081

app.security.user.name=admin
app.security.user.password=admin123
app.security.user.role=ADMIN

